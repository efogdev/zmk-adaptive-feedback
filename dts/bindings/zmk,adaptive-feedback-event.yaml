description: ZMK Adaptive Feedback per-event LED configuration

compatible: "zmk,adaptive-feedback-event"

properties:
  event-type:
    type: string
    required: true
    enum:
      - "layer"
      - "battery-warning"
      - "battery-critical"
      - "usb-connected"
      - "usb-disconnected"
      - "ble-profile-changed"
      - "idle"
      - "no-endpoint"
      - "studio-unlocked"
      - "studio-locked"
      - "custom"

  custom-event-name:
    type: string
    description: >
      Name of the custom event to configure (must match a ZAF_CUSTOM_EVENT_DEFINE name).
      Only used when event-type is "custom".

  layer-index:
    type: int
    default: 0

  battery-level:
    type: int
    default: 1

  colors:
    type: uint8-array
    required: true

  persistent:
    type: boolean

  animation:
    type: string
    default: "solid"
    enum:
      - "solid"
      - "blink"
      - "breathe"
      - "flash"

  blink-on-ms:
    type: int
    default: 500

  blink-off-ms:
    type: int
    default: 500

  flash-duration-ms:
    type: int
    default: 300

  flash-ease-in-ms:
    type: int
    default: 0
    description: >
      Duration of the fade-in easing phase at the start of the flash (ms).
      0 means the LED turns ON instantly (default).

  flash-ease-in-fn:
    type: string
    default: "linear"
    enum:
      - "linear"
      - "quad-in"
      - "quad-out"
      - "quad-in-out"
      - "cubic-in"
      - "cubic-out"
      - "cubic-in-out"
      - "quart-in"
      - "quart-out"
      - "quart-in-out"
      - "expo-in"
      - "expo-out"
      - "bounce-out"
      - "bounce-in"
    description: Easing curve applied during the flash fade-in phase.

  flash-ease-out-ms:
    type: int
    default: 0
    description: >
      Duration of the fade-out easing phase at the end of the flash (ms).
      0 means the LED turns OFF instantly (default).

  flash-ease-out-fn:
    type: string
    default: "linear"
    enum:
      - "linear"
      - "quad-in"
      - "quad-out"
      - "quad-in-out"
      - "cubic-in"
      - "cubic-out"
      - "cubic-in-out"
      - "quart-in"
      - "quart-out"
      - "quart-in-out"
      - "expo-in"
      - "expo-out"
      - "bounce-out"
      - "bounce-in"
    description: Easing curve applied during the flash fade-out phase.

  feedback-duration:
    type: int
    default: 0
